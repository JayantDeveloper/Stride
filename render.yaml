services:
  - type: web
    name: stride-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: stride-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CALENDAR_TIMEZONE
        value: America/New_York
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
